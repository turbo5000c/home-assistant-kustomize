  #             path: /opt/home-assistant/config
  #             type: DirectoryOrCreate
  #       - op: replace
  #         path: /spec/template/spec/containers/0/volumeMounts/0
  #         value:
  #           name: home-assistant-config
  #           mountPath: /config
  #     target:
  #       kind: StatefulSet
  #       name: home-assistant
  #
  #   # -- Bluetooth / D-Bus passthrough ------------------------------------
