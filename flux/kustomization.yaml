---
# FluxCD Kustomization — instructs Flux to apply the home-assistant manifests
# from the GitRepository defined in gitrepository.yaml.
# Apply this to your Flux management cluster alongside flux/gitrepository.yaml.
#
# Docs: https://fluxcd.io/flux/components/kustomize/kustomizations/
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: home-assistant-kustomize
  path: "./"
  targetNamespace: home-assistant
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: infrastructure-configs
  # ---------------------------------------------------------------------------
  # Optional patches — uncomment any block you need.
  # ---------------------------------------------------------------------------
